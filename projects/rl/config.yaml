data:
  train_files:
    - ./zhouyik/ver4k_train.parquet
  val_files: 
    - ./zhouyik/ver4k_train.parquet
  cap_prompt_key: cap_problem
  cap_answer_key: cap_answer
  seg_prompt_key: seg_problem
  seg_answer_key: seg_answer
  image_key: images
  video_key: videos
  image_dir: null
  video_fps: 2.0
  max_prompt_length: 8192
  max_response_length: 8192
  rollout_batch_size: 512  # equivalent to verl's data.train_batch_size
  mini_rollout_batch_size: null  # equivalent to verl's data.gen_batch_size
  val_batch_size: 1024
  format_prompt: ./projects/rl/format_prompt/r1v.jinja
  override_chat_template: null
  shuffle: true
  seed: 1
  min_pixels: 3136
  max_pixels: 1605632
  filter_overlong_prompts: true
  region_format: mask_token
algorithm:
  adv_estimator: grpo
  disable_kl: false
  use_kl_loss: true
  kl_penalty: low_var_kl
  kl_coef: 1.0e-2
  online_filtering: false  # dapo filter groups
  filter_key: overall
  filter_low: 0.01
  filter_high: 0.99

worker:
  actor:
    global_batch_size: 128  # equivalent to verl's actor.ppo_mini_batch_size
    micro_batch_size_per_device_for_update: 1  # equivalent to verl's actor.ppo_micro_batch_size_per_gpu
    micro_batch_size_per_device_for_experience: 2  # equivalent to verl's rollout.log_prob_micro_batch_size_per_gpu
    max_grad_norm: 1.0
    padding_free: true
    dynamic_batching: true
    ulysses_size: 1
    optimize_captioner: true
    optimize_segmenter: true
    model:
      model_path: work_dirs/qwen25vl_3b_cold_start/qwen25vl_3b_mt_cold_start
      enable_gradient_checkpointing: true
      trust_remote_code: true
      freeze_vision_tower: true
    optim:
      lr: 1.0e-6
      weight_decay: 1.0e-2
      strategy: adamw  # {adamw, adamw_bf16}
      lr_warmup_ratio: 0.0
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      enable_rank0_init: true
    offload:
      offload_params: true  # true: more CPU memory; false: more GPU memory
      offload_optimizer: true  # true: more CPU memory; false: more GPU memory

  rollout:
    n: 8
    temperature: 1.0
    top_p: 1.0
    max_num_batched_tokens: 16384
    limit_images: 0
    gpu_memory_utilization: 0.6
    enforce_eager: false
    enable_chunked_prefill: false
    tensor_parallel_size: 1
    disable_tqdm: false
    val_override_config:
      temperature: 0.6
      top_p: 0.95
      n: 1

  ref:
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: true  # true: more CPU memory; false: more GPU memory
      enable_rank0_init: true
    offload:
      offload_params: false

  reward:
    reward_type: batch
    reward_function: ./projects/rl/reward_function/text2mask.py:compute_score
    skip_special_tokens: false
    codebook_size: 256
    codebook_depth: 2
    mask_tokenizer_path: ./Qwen/Qwen3-VL-4B-SAMTok/mask_tokenizer_256x2.pth
    sam2_pretrained_weight: ./Qwen/sam2.1_hiera_large.pt

trainer:
  total_epochs: 16
  max_steps: null
  project_name: mask_tokenizer_grpo
  experiment_name: qwen25vl_3b_gcg_ver_gres
  logger: ["file", "wandb"]
  nnodes: 1
  n_gpus_per_node: 8
  max_try_make_batch: 20  # -1 means no limit
  val_freq: 5  # -1 to disable
  val_before_train: true
  val_only: false
  val_generations_to_log: 3
  save_freq: 5  # -1 to disable
  save_limit: 3  # -1 to disable
  save_model_only: false
  save_checkpoint_path: null
  load_checkpoint_path: null
  find_last_checkpoint: true
